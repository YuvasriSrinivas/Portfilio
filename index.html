<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvasri Srinivas| Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#111] text-white font-sans antialiased overflow-hidden">

    <!-- 1. PRELOADER -->
    <div id="loader" class="fixed inset-0 bg-[#e61e25] z-50 flex items-center justify-center select-none transition-all duration-700 ease-in-out">
        <h1 id="loader-text" class="text-white text-5xl md:text-7xl font-black tracking-wider transition-all duration-1000 ease-out transform scale-90 opacity-0">
            Yuvasri Srinivas👋
        </h1>
    </div>

    <!-- MAIN CONTENT WRAPPER -->
    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        
        <!-- 2. NAVBAR -->
        <header class="fixed top-0 left-0 w-full z-40 bg-[#111] border-b border-white/5 px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black tracking-wide text-white">Molleti Yuvasri Srinivas</div>
            <nav class="hidden md:flex space-x-8 text-sm font-medium text-gray-300">
                <a href="./index.html" class="hover:text-[#e61e25] transition-colors">Home</a>
                <a href="./about.html" class="hover:text-[#e61e25] transition-colors">About</a>
                <a href="./skill.html" class="hover:text-[#e61e25] transition-colors">Skills</a>
                <a href="./project.html" class="hover:text-[#e61e25] transition-colors">Projects</a>
                <a href="./contact.html" class="hover:text-[#e61e25] transition-colors">Contact</a>
            </nav>
            <button class="bg-[#e61e25] hover:bg-[#c1141a] text-white px-5 py-2 rounded-full text-sm font-semibold transition-all shadow-lg shadow-[#e61e25]/20">
               <a href="./hireme.html">Hire me</a>
            </button>
        </header>

        <!-- 3. HERO SECTION WITH BACKGROUND VIDEO -->
        <section id="home" class="h-[calc(100vh-73px)] mt-[73px] flex flex-col md:flex-row items-center justify-between px-6 md:px-20 relative overflow-hidden">
            
            <!-- BACKGROUND VIDEO CONTAINER (Aligned to bottom to clear navbar) -->
            <div class="absolute inset-0 z-0">
                <video 
                    autoplay 
                    loop 
                    muted
                    playsinline 
                    class="w-full h-full object-cover object-bottom"
                >
                    <source src="./public/yuvasrisrinivas_Create_a_p.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <!-- Dark overlay to keep the typography clean and readable -->
                <div class="absolute inset-0 bg-black/75 backdrop-blur-sm"></div>
            </div>

            <!-- Left Column: Copywriting -->
            <div class="w-full md:w-1/2 flex flex-col justify-center space-y-6 z-10 text-center md:text-left mt-8 md:mt-0">
                <h2 class="text-3xl md:text-5xl font-bold tracking-tight">
                    Hi, I'm a <br />
                    <b>Molleti Yuvasri Srinivas</b>
                    <span class="text-[#e61e25] text-4xl md:text-6xl font-extrabold block mt-2 animate-pulse">
                        Full-Stack Developer
                    </span>
                </h2>
                <p class="text-gray-400 text-base md:text-lg max-w-md mx-auto md:mx-0 leading-relaxed">
                    I build fast, scalable, and modern web applications using React, Node.js, and Tailwind CSS.
                </p>
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-4 pt-4">
                    <button class="bg-white text-black hover:bg-gray-200 px-6 py-3 rounded-md font-bold transition-all transform hover:-translate-y-0.5">
                        <a href="./project.html">View My Work</a>
                    </button>
                    <button class="border border-white/20 hover:border-[#e61e25] hover:text-[#e61e25] px-6 py-3 rounded-md font-bold transition-all transform hover:-translate-y-0.5">
                    <a href="./contact.html">Contact Me</a>
                    </button>
                </div>
            </div>

            <!-- Right Column: Voice Controller -->
            <div class="w-full md:w-1/2 flex items-center justify-center md:justify-end relative h-[150px] md:h-[500px]">
                <!-- Floating Voice Controller -->
                <button 
                    id="audio-btn"
                    class="relative md:absolute bottom-4 right-0 md:bottom-12 md:right-16 bg-[#e61e25] hover:bg-white hover:text-black text-white p-4 rounded-full flex items-center justify-center shadow-xl border-2 border-white/10 transition-all transform hover:scale-110 group z-10"
                >
                    <span id="audio-text" class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider px-1">
                        ▶ Play Intro
                    </span>
                </button>
            </div>
        </section>
    </div>

    <!-- Custom external JavaScript -->
    <script src="script.js"></script>
</body>
</html>
